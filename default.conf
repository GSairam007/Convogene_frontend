server {
    listen 443; # Assuming you have SSL configuration handled here or via 'include'
    server_name your-domain.com www.your-domain.com;
    root /usr/share/nginx/html;
 
    # --- Performance Headers for ALL Proxied Locations ---
    # These settings are applied globally within the server block 
    # and improve the handling of responses from the backend.
    proxy_http_version 1.1;
    proxy_ssl_server_name on;
    # Buffer Optimization (copied from main nginx.conf)
    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;
 
    # Gzip Compression is inherited from the 'http' block, 
    # but we ensure proxy headers are passed correctly
    proxy_set_header Accept-Encoding "gzip";
 
    # --- CLIENT-SIDE CACHING (Static Files) 🖼️ ---
    # This location handles your application's static assets (JS, CSS, images) 
    # directly from the root directory (/usr/share/nginx/html), telling browsers 
    # to cache them for 30 days.
location ~* \.(?:jpg|jpeg|gif|png|webp|ico|css|js|woff2|woff|eot|ttf|otf|svg)$ {
    root /usr/share/nginx/html;
 
    expires 1y;
    access_log off;
 
    add_header Cache-Control "public, max-age=31536000, immutable, no-transform";
    add_header Vary "Accept-Encoding";
}
 
# --- HTML FILES SHOULD NOT BE CACHED ---
location ~* \.(html)$ {
    root /usr/share/nginx/html;
 
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
}
 
 
    # --- DEFAULT ROOT LOCATION (SPA Index) ---
    location / {
        try_files $uri $uri/ /index.html;
    }
 
    # --- DYNAMIC API PROXY LOCATIONS (NO CACHING APPLIED) ---
    # These are dynamic endpoints (streaming, listing, feedback), 
    # so we apply performance headers but skip Nginx server-side caching.
 
    location /rag_qa_api_stream {
        # Handle CORS
        add_header Access-Control-Allow-Origin "https://amd-frontend-prod.ashycliff-b1403732.eastus.azurecontainerapps.io";
        add_header Access-Control-Allow-Methods "*";
        add_header Access-Control-Allow-Headers "*";
        # Proxy the request to the backend
        proxy_pass https://amd-backend.internal.ashycliff-b1403732.eastus.azurecontainerapps.io/rag_qa_api_stream;
    }
 

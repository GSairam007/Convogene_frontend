user  nginx;
worker_processes  auto;
 
# Core Optimization: Increase open file limit for worker processes
worker_rlimit_nofile 65535;
 
error_log  /var/log/nginx/error.log notice;
pid        /run/nginx.pid;
 
 
events {
    # Increase worker connections for higher concurrency
    worker_connections  2048; 
    # Enable multi_accept to allow a worker to accept multiple connections at once
    multi_accept on;
}
 
 
http {
    # --- SERVER-SIDE CACHE DEFINITION (HTTP Block) ---
    # Defines the cache zone: 10MB RAM for keys, 10GB max disk space, inactivity timeout 60 minutes.
    proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=my_cache:10m max_size=10g 
                     inactive=60m use_temp_path=off;
 
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
 
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';
 
    access_log  /var/log/nginx/access.log  main;
 
    # Basic Performance Tuning
    sendfile         on;
    tcp_nopush       on; 
    tcp_nodelay      on; 
    keepalive_timeout 65;
    # Buffer Optimization (Speed Improvement)
    client_max_body_size 10M; 
    client_body_buffer_size 128k;
    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;
    # Gzip Compression (Speed Improvement)
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
 
    # Include all server blocks from the conf.d directory
    include /etc/nginx/conf.d/*.conf;
}
